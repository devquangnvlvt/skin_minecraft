<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Skin Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./skin-editor.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="2" width="24" height="24" rx="4" fill="#4ade80"/>
          <rect x="8" y="6" width="12" height="10" rx="1" fill="#1a1a2e"/>
          <rect x="6" y="16" width="6" height="8" rx="1" fill="#1a1a2e"/>
          <rect x="16" y="16" width="6" height="8" rx="1" fill="#1a1a2e"/>
        </svg>
        <span>Skin Editor</span>
      </div>
    </div>
    <div class="header-center">
      <nav class="tab-nav">
        <a href="./index.html" class="tab-link">3D Viewer</a>
        <a href="./skin-editor.html" class="tab-link active">Skin Editor</a>
      </nav>
    </div>
    <div class="header-right">
      <button id="btn-upload-skin" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Skin
      </button>
      <button id="btn-download-skin" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
      <input id="upload-input" type="file" accept="image/png" hidden />
    </div>
  </header>

  <!-- Main Layout -->
  <main class="main-layout">

    <!-- Left: Tools Panel -->
    <aside class="tools-panel">
      <div class="panel-section">
        <p class="panel-label">Tools</p>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="pencil" title="Pencil (P)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
          </button>
          <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l11-11 7 7-1 8z"/><path d="M6.5 17.5l-4-4"/></svg>
          </button>
          <button class="tool-btn" data-tool="fill" title="Fill (F)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 11L8.5 1.5 3 7l9.5 9.5"/><path d="M7.5 15.5L4 19a2 2 0 0 0 3 3l3.5-3.5"/><path d="M19 11c1 1 1 3-1 5s-4 2-5 1"/></svg>
          </button>
          <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22l1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="M15 6l3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8-3 3-1.4-1.4 3-3L9 6l6-4.4"/></svg>
          </button>
        </div>
      </div>

      <div class="panel-section">
        <p class="panel-label">Brush Size</p>
        <input type="range" id="brush-size" min="1" max="8" value="1" class="slider" />
        <span id="brush-size-val" class="slider-val">1px</span>
      </div>

      <div class="panel-section">
        <p class="panel-label">Color</p>
        <div class="color-picker-wrap">
          <input type="color" id="color-picker" value="#3b82f6" class="color-input-native" />
          <div class="color-preview" id="color-preview" style="background:#3b82f6;"></div>
          <input type="text" id="color-hex" value="#3b82f6" class="color-hex-input" maxlength="7" />
        </div>
      </div>

      <div class="panel-section">
        <p class="panel-label">Palette</p>
        <div class="palette-grid" id="palette-grid"></div>
        <button class="btn-add-color" id="btn-add-palette">+ Add</button>
      </div>

      <div class="panel-section">
        <p class="panel-label">Opacity</p>
        <input type="range" id="opacity-slider" min="0" max="100" value="100" class="slider" />
        <span id="opacity-val" class="slider-val">100%</span>
      </div>

      <div class="panel-section">
        <p class="panel-label">View</p>
        <label class="toggle-row">
          <input type="checkbox" id="toggle-grid" checked />
          <span class="toggle-label">Show 2D Grid</span>
        </label>
        <label class="toggle-row" style="margin-top: 6px;">
          <input type="checkbox" id="toggle-3d-grid" />
          <span class="toggle-label">Show 3D Grid</span>
        </label>
      </div>
    </aside>

    <!-- Center: 2D Editor -->
    <section class="editor-section">
      <!-- UV Part Tabs -->
      <div class="uv-tabs">
        <button class="uv-tab active" data-part="head">Head</button>
        <button class="uv-tab" data-part="body">Body</button>
        <button class="uv-tab" data-part="right_arm">R.Arm</button>
        <button class="uv-tab" data-part="left_arm">L.Arm</button>
        <button class="uv-tab" data-part="right_leg">R.Leg</button>
        <button class="uv-tab" data-part="left_leg">L.Leg</button>
        <button class="uv-tab" data-part="full">Full UV</button>
      </div>

      <!-- Canvas Area -->
      <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="editor-canvas"></canvas>
        <canvas id="grid-canvas" style="pointer-events:none; position:absolute; top:0; left:0;"></canvas>
        <canvas id="cursor-canvas" style="pointer-events:none; position:absolute; top:0; left:0;"></canvas>
      </div>

      <!-- Zoom Controls -->
      <div class="zoom-bar">
        <button id="btn-zoom-out" class="zoom-btn">−</button>
        <span id="zoom-label">4x</span>
        <button id="btn-zoom-in" class="zoom-btn">+</button>
        <button id="btn-zoom-fit" class="zoom-btn zoom-fit">Fit</button>
        <span class="zoom-sep"></span>
        <button id="btn-undo" class="zoom-btn" title="Undo Ctrl+Z">↩</button>
        <button id="btn-redo" class="zoom-btn" title="Redo Ctrl+Y">↪</button>
      </div>
    </section>

    <!-- Right: 3D Preview -->
    <aside class="preview-panel">
      <p class="panel-label">3D Preview</p>
      <canvas id="skin-preview-canvas" class="preview-canvas"></canvas>

      <div class="panel-section" style="margin-top:12px;">
        <p class="panel-label">Animation</p>
        <div class="anim-grid">
          <button class="anim-btn active" data-anim="">None</button>
          <button class="anim-btn" data-anim="idle">Idle</button>
          <button class="anim-btn" data-anim="walk">Walk</button>
          <button class="anim-btn" data-anim="run">Run</button>
        </div>
      </div>

      <div class="panel-section">
        <p class="panel-label">Model</p>
        <select id="model-select" class="select-input">
          <option value="auto-detect">Auto Detect</option>
          <option value="default">Default (4px arms)</option>
          <option value="slim">Slim (3px arms)</option>
        </select>
      </div>

      <div class="panel-section">
        <p class="panel-label">Quick Load</p>
        <div class="quick-skins" id="quick-skins"></div>
      </div>
    </aside>
  </main>

  <script type="module" src="./skin-editor.ts"></script>
</body>
</html>
